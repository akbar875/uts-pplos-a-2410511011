version: '3.9'

services:

  # Databases 
  auth-db:
    image: mysql:8.0
    container_name: db_auth
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ''
      MYSQL_DATABASE: db_auth
    ports:
      - "3307:3306"
    volumes:
      - db-auth-data:/var/lib/mysql
    networks:
      - pplos-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  perpustakaan-db:
    image: mysql:8.0
    container_name: db_perpustakaan
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ''
      MYSQL_DATABASE: db_perpustakaan
    ports:
      - "3308:3306"
    volumes:
      - db-perpustakaan-data:/var/lib/mysql
    networks:
      - pplos-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  member-db:
    image: mysql:8.0
    container_name: db_member
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ''
      MYSQL_DATABASE: db_member
    ports:
      - "3309:3306"
    volumes:
      - db-member-data:/var/lib/mysql
    networks:
      - pplos-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Services 
  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: db_auth
      DB_PORT: 3306
      DB_NAME: db_auth
      DB_USER: root
      DB_PASS: ''
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 7d
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: http://localhost:3001/api/auth/oauth/github/callback
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - pplos-net

  perpustakaan-service:
    build: ./services/perpustakaan-service
    container_name: perpustakaan-service
    restart: unless-stopped
    environment:
      APP_NAME: PerpustakaanService
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db_perpustakaan
      DB_PORT: 3306
      DB_DATABASE: db_perpustakaan
      DB_USERNAME: root
      DB_PASSWORD: ''
      JWT_SECRET: ${JWT_SECRET}
      MEMBER_SERVICE_URL: http://member-service:3002
    command: >
      sh -c "php artisan config:clear &&
             php artisan migrate --force &&
             php artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000"
    depends_on:
      perpustakaan-db:
        condition: service_healthy
    networks:
      - pplos-net

  member-service:
    build: ./services/member-service
    container_name: member-service
    restart: unless-stopped
    environment:
      PORT: 3002
      DB_HOST: db_member
      DB_PORT: 3306
      DB_NAME: db_member
      DB_USER: root
      DB_PASS: ''
      JWT_SECRET: ${JWT_SECRET}
      PERPUSTAKAAN_SERVICE_URL: http://perpustakaan-service:8000
      AUTH_SERVICE_URL: http://auth-service:3001
      DENDA_PER_HARI: 10000
    ports:
      - "3002:3002"
    depends_on:
      member-db:
        condition: service_healthy
      perpustakaan-service:
        condition: service_started
    networks:
      - pplos-net

  gateway:
    build: ./gateway
    container_name: api-gateway
    restart: unless-stopped
    environment:
      PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:3001
      PERPUSTAKAAN_SERVICE_URL: http://perpustakaan-service:8000
      MEMBER_SERVICE_URL: http://member-service:3002
      JWT_SECRET: supersecretjwtkey_minimal32karakter
      RATE_LIMIT_MAX: 60
      RATE_LIMIT_WINDOW_MS: 60000
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - perpustakaan-service
      - member-service
    networks:
      - pplos-net

# Networks & Volumes 
networks:
  pplos-net:
    driver: bridge

volumes:
  db-auth-data:
  db-perpustakaan-data:
  db-member-data: